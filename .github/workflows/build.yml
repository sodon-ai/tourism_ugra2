name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK with Kivy Docker
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE=1 \
            ghcr.io/kivy/kivy:master \
            bash -c "
              apt-get update
              pip install buildozer cython
              buildozer android debug
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ugratour-apk
          path: ./bin/*.apk
